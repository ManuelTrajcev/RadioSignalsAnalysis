services:
  postgres:
    build:
      context: .
      dockerfile: Postgres/Dockerfile
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radiosignals"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./RadioSignalsBackEnd
      dockerfile: Dockerfile
    container_name: radiosignals-backend
    ports:
      - "5229:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=radiosignals;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

