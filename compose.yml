services:
  postgres:
    build:
      context: .
      dockerfile: Postgres/Dockerfile
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radiosignals"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml:
    build:
      context: ./RadioSignalsML
      dockerfile: Dockerfile
    container_name: radiosignals-ml
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./RadioSignalsBackEnd
      dockerfile: Dockerfile
    container_name: radiosignals-backend
    ports:
      - "5229:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=radiosignals;Username=postgres;Password=postgres
      - PredictionService__BaseUrl=http://ml:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./RadioSignalsFrontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5229/api
    container_name: radiosignals-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

