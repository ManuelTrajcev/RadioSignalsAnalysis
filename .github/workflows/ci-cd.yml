name: CI/CD

# Pipeline stages:
#   1. test          — backend unit-test suite (always; PRs included).
#   2. build-and-push — on push to main / manual dispatch, builds & pushes one image per service
#                       to Docker Hub. Gated on green tests via `needs: test`, skipped on PRs.
#   3. k8s-smoke-test — stands up a throwaway k3d cluster in the runner, applies k8s/, and
#                       verifies every workload becomes Ready and the Ingress routes to the
#                       frontend. Catches broken manifests before they reach a real cluster.
#   4. deploy         — applies the k8s/ manifests and rolls the cluster onto the freshly built
#                       git-SHA images. Runs only when a KUBE_CONFIG secret is configured
#                       (a local k3d cluster is not reachable from GitHub runners, so this
#                       no-ops gracefully when the secret is absent).

on:
  push:
    branches: [main]
    paths:
      - 'RadioSignalsBackEnd/**'
      - 'RadioSignalsML/**'
      - 'RadioSignalsFrontEnd/**'
      - 'Postgres/**'
      - 'k8s/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'RadioSignalsBackEnd/**'
      - 'RadioSignalsML/**'
      - 'RadioSignalsFrontEnd/**'
      - 'Postgres/**'
      - 'k8s/**'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_REPO: manueltrajcev/radio-signals

jobs:
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadioSignalsBackEnd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RadioSignals.sln

      - name: Build
        run: dotnet build RadioSignals.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RadioSignals.sln --configuration Release --no-build --verbosity normal

  build-and-push:
    name: Build & push images
    needs: test                       # gates image publishing on a green test run
    if: github.event_name != 'pull_request'   # never publish from PRs (incl. fork PRs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # `latesttag` is the moving tag the k8s manifests reference; `tagprefix` also drives the
        # immutable `<prefix>-<sha>` tag the deploy job pins to. The frontend is built twice: a
        # generic image and a k8s-specific one whose API base URL is the relative `/api` path the
        # Ingress serves (replacing the previous manual local build + `k3d image import`).
        include:
          - { name: backend,      context: "./RadioSignalsBackEnd",  dockerfile: "RadioSignalsBackEnd/Dockerfile",  tagprefix: "api",          latesttag: "api-latest",      buildargs: "" }
          - { name: ml,           context: "./RadioSignalsML",       dockerfile: "RadioSignalsML/Dockerfile",       tagprefix: "ml",           latesttag: "ml-latest",       buildargs: "" }
          - { name: frontend,     context: "./RadioSignalsFrontEnd", dockerfile: "RadioSignalsFrontEnd/Dockerfile", tagprefix: "frontend",     latesttag: "frontend-latest", buildargs: "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" }
          - { name: frontend-k8s, context: "./RadioSignalsFrontEnd", dockerfile: "RadioSignalsFrontEnd/Dockerfile", tagprefix: "frontend-k8s", latesttag: "frontend-k8s",    buildargs: "VITE_API_BASE_URL=/api" }
          - { name: db,           context: "Postgres",               dockerfile: "Postgres/Dockerfile",             tagprefix: "db",           latesttag: "db-latest",       buildargs: "" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ matrix.latesttag }}
            type=sha,prefix=${{ matrix.tagprefix }}-,format=short

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.buildargs }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k8s-smoke-test:
    name: Smoke-test on ephemeral k3d
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20          # hard cap so a failed rollout can't burn the default 6h budget
    permissions:
      contents: read
    env:
      CLUSTER: radio-signals-ci
      NAMESPACE: radio-signals
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create ephemeral cluster
        # k3s bundles Traefik (matches ingress.yaml's ingressClassName: traefik); map the
        # loadbalancer's :80 to a host port so we can curl the Ingress from the runner.
        run: k3d cluster create "$CLUSTER" --port "8081:80@loadbalancer" --wait --timeout 150s

      - name: Apply manifests & pin to this build's images
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::7}"
          kubectl apply -k k8s/
          kubectl -n "$NAMESPACE" set image deploy/backend       backend=$IMAGE_REPO:api-$SHA
          kubectl -n "$NAMESPACE" set image deploy/ml            ml=$IMAGE_REPO:ml-$SHA
          kubectl -n "$NAMESPACE" set image deploy/frontend      frontend=$IMAGE_REPO:frontend-k8s-$SHA
          kubectl -n "$NAMESPACE" set image statefulset/postgres postgres=$IMAGE_REPO:db-$SHA

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          # Order mirrors the dependency chain: DB first, then ml, then backend (runs EF
          # migrations on start, so it gets the longest budget), then frontend.
          kubectl -n "$NAMESPACE" rollout status statefulset/postgres --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deploy/ml             --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deploy/backend        --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/frontend       --timeout=120s

      - name: Smoke-test Ingress -> frontend
        run: |
          set -euo pipefail
          # Give Traefik a moment to publish the Ingress route, then assert a 200 from the SPA.
          for i in $(seq 1 12); do
            if curl -fsS -H "Host: radiosignals.local" http://localhost:8081/ -o /dev/null; then
              break
            fi
            echo "waiting for ingress route ($i/12)"; sleep 5
          done
          curl -fsS -H "Host: radiosignals.local" http://localhost:8081/ -o /dev/null -w "frontend via ingress: HTTP %{http_code}\n"

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get all -n "$NAMESPACE" || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp || true
          kubectl describe pods -n "$NAMESPACE" || true
          kubectl logs -n "$NAMESPACE" -l app=backend --tail=100 || true
          kubectl logs -n "$NAMESPACE" -l app=ml --tail=100 || true

      - name: Tear down cluster
        if: always()
        timeout-minutes: 3       # k3d delete occasionally hangs on Docker cleanup; bound it
        run: k3d cluster delete "$CLUSTER" || true

  deploy:
    name: Deploy to Kubernetes
    needs: k8s-smoke-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      NAMESPACE: radio-signals
      INGRESS_HOST: ${{ vars.INGRESS_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect kubeconfig
        id: kube
        # No CD target is configured for a local-only cluster; skip cleanly instead of failing.
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::KUBE_CONFIG secret not set — skipping cluster deploy."
          fi

      - name: Configure kubeconfig
        if: steps.kube.outputs.present == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          # Accept the secret either base64-encoded or as a raw kubeconfig.
          if printf '%s' "$KUBE_CONFIG" | base64 -d 2>/dev/null | grep -q 'apiVersion'; then
            printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
            echo "Loaded base64-encoded kubeconfig."
          else
            printf '%s\n' "$KUBE_CONFIG" > "$HOME/.kube/config"
            echo "Loaded raw kubeconfig."
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Check cluster reachability
        id: reach
        if: steps.kube.outputs.present == 'true'
        # Fail fast (15s) instead of hanging on apply when the API endpoint isn't reachable —
        # e.g. a local k3d/minikube kubeconfig pointing at 0.0.0.0/127.0.0.1.
        run: |
          if kubectl cluster-info --request-timeout=15s >/dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cluster API not reachable from this runner — skipping deploy. (A local k3d/minikube endpoint like https://0.0.0.0 only works from your own machine.)"
          fi

      - name: Apply manifests & roll out git-SHA images
        if: steps.kube.outputs.present == 'true' && steps.reach.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::7}"

          # Apply the desired state (Namespace, ConfigMaps/Secrets, Services, Ingress, workloads).
          kubectl apply -k k8s/ --request-timeout=60s

          # Optionally override the Ingress hostname from a GitHub variable (e.g. Vultr DNS).
          if [ -n "${INGRESS_HOST:-}" ]; then
            kubectl -n "$NAMESPACE" patch ingress radiosignals-ingress \
              --type='merge' \
              -p "{\"spec\":{\"rules\":[{\"host\":\"$INGRESS_HOST\",\"http\":{\"paths\":[{\"path\":\"/api\",\"pathType\":\"Prefix\",\"backend\":{\"service\":{\"name\":\"backend\",\"port\":{\"number\":8080}}}},{\"path\":\"/\",\"pathType\":\"Prefix\",\"backend\":{\"service\":{\"name\":\"frontend\",\"port\":{\"number\":80}}}}]}}]}}"
            echo "Ingress host set to: $INGRESS_HOST"
          else
            echo "INGRESS_HOST not set; keeping manifest host as-is."
          fi

          # Pin each workload to the immutable image built in this run so the rollout actually
          # pulls the new code (moving tags alone wouldn't force a re-pull).
          kubectl -n "$NAMESPACE" set image deploy/backend       backend=$IMAGE_REPO:api-$SHA
          kubectl -n "$NAMESPACE" set image deploy/ml            ml=$IMAGE_REPO:ml-$SHA
          kubectl -n "$NAMESPACE" set image deploy/frontend      frontend=$IMAGE_REPO:frontend-k8s-$SHA
          kubectl -n "$NAMESPACE" set image statefulset/postgres postgres=$IMAGE_REPO:db-$SHA

          # Wait for each rollout to converge (DB first; backend gets the longest budget — EF migrations).
          kubectl -n "$NAMESPACE" rollout status statefulset/postgres --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deploy/ml             --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deploy/backend        --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deploy/frontend       --timeout=120s
