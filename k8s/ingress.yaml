apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radiosignals-ingress
spec:
  ingressClassName: traefik
  rules:
    kubectl apply -k k8s/
    kubectl -n radio-signals get ingress radiosignals-ingress -o yaml    - http:
        paths:
          # /api is matched before / (Traefik orders by path length: longer prefix wins).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
